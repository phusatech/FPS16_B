<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - VE100 26001</title>

  <!-- ================= STYLES ================= -->
  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="./electrophoresis.css">
  <link rel="stylesheet" href="../general_style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">VE100</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-bolt-lightning"></i>
        <span data-i18n="HEADER_ELECTROPHORESIS"></span>
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="main-layout">
      <!-- LEFT STAGE PANEL -->
      <div class="stage-panel" id="stagePanel"></div>

      <!-- RIGHT SIDE (CAMERA + CONTROL) -->
      <div class="right-panel">

          <div class="camera-header">
              <span class="dot"></span>
              <span data-i18n="LABEL_CAMERA_PREVIEW"></span>
          </div>

          <!-- CAMERA WRAPPER (LANDSCAPE + RESPONSIVE) -->
          <div class="camera-view">
              <div class="camera-wrapper" id="cameraWrapper">
                  <img id="img">
                  <button class="fullscreen-btn" onclick="toggleFullscreen()">
                      <i class="fa-solid fa-expand"></i>
                  </button>
              </div>
          </div>

          <div class="control-bar">
              <div class="voltage-box">
                  <span data-i18n="LABEL_VOLTAGEREAD"></span>
                  <span id="currentVoltage">0 V</span>
              </div>
          </div>

      </div>
  </main>


  <!-- ================= FOOTER ================= -->
  <footer>
    <!-- <button id="btnBack" type="button">Back</button> -->
    <button id="btnStop" type="button" data-i18n="BUTTON_STOP"> </button>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="../Navigation/nav.js"></script>
  <script src="electrophoresis.js"></script>
  <script src="../lang/i18n.js"></script>

</body>
</html>
