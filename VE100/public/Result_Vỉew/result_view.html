<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - Spotcheck 26001</title>

  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="./result_view.css">
  <link rel="stylesheet" href="../general_style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-square-poll-horizontal"></i> RESULTS
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="result-container">

      <!-- ===== LEFT PANEL: RESULT FOLDERS ===== -->
      <div class="result-panel" style="flex: 1;">

        <div class="panel-header">
          <h2>Result Folders</h2>
        </div>

        <div class="panel-body">
          <div id="result-grid" class="result-grid"></div>
        </div>

        <div class="panel-footer">
          <button id="download-btn">
            <i class="fas fa-download"></i> Download
          </button>
          <button id="delete-btn">Delete</button>
          <button id="deleteall-btn">Delete All</button>
        </div>

      </div>

      <!-- ===== RIGHT PANEL: RESULT PREVIEW ===== -->
      <div class="result-panel" style="flex: 1.2;">

        <div class="panel-header">
          <h2>Result Preview</h2>
        </div>

        <div id="excel-preview" class="panel-body">
          <p style="opacity: 0.6; text-align: center;">
            Select a folder to preview result
          </p>
        </div>

      </div>

    </div>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer>
    <button id="back-btn" type="button">Back</button>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="../Navigation/nav.js"></script>
  <script src="result_view.js"></script>

</body>
</html>
