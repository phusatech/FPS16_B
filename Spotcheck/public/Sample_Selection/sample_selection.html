<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - Spotcheck 26001</title>

  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="./sample_selection.css">
  <link rel="stylesheet" href="../general_style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-magnifying-glass-chart"></i>
        <span data-i18n="HEADER_SAMPLEFILE_SELECTION"></span>
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="container">

      <!-- ===== FILE PANEL ===== -->
      <div class="file-panel">

        <div class="panel-header">
          <h2 data-i18n="LABEL_SAMPLEFILE"></h2>
        </div>

        <div class="panel-body">
          <div id="result-grid" class="result-grid">
            <!-- Items will be created in JavaScript -->
          </div>
        </div>

        <div class="panel-footer">
          <button id="btnCreate" class="btnCreate" data-i18n="BUTTON_CREATE"></button>
        </div>

      </div>

      <!-- ===== WELL PLATE ===== -->
      <div class="plate">
        <table id="wellTable">
          <thead>
            <tr>
              <th></th>
              <th>1</th>
              <th>2</th>
              <th>3</th>
              <th>4</th>
            </tr>
          </thead>

          <tbody id="wellGrid"></tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ================= EMAIL DIALOG ================= -->
  <div id="email-dialog" class="email-dialog">
    <div class="email-dialog-content">

      <h3 data-i18n="LABEL_RECIPIENT_EMAIL"></h3>

      <input
        id="email-input"
        type="text"
        placeholder="email1@example.com, email2@example.com"
      >

      <div class="email-dialog-buttons">
        <button id="email-cancel" data-i18n="BUTTON_CANCEL"></button>
        <button id="email-ok" data-i18n="BUTTON_ANALYSIS_1"></button>
      </div>

    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer>
    <button id="btnBack" type="button" data-i18n="BUTTON_BACK"></button>
    <button id="btnNext" type="button" data-i18n="BUTTON_ANALYSIS_1"></button>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="../Navigation/nav.js"></script>
  <script src="sample_selection.js"></script>
  <script src="../lang/i18n.js"></script>

</body>
</html>
