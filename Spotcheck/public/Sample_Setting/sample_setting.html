<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - Spotcheck 26001</title>

  <!-- ================= STYLES ================= -->
  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="sample_setting.css">
  <link rel="stylesheet" href="../general_style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-file"></i>
        <span data-i18n="HEADER_SAMPLEFILE_MANAGEMENT"></span>
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="container">

      <!-- ===== WELL PLATE ===== -->
      <div class="plate">
        <table id="wellTable" class="well-table">
          <thead id="wellHead"></thead>
          <tbody id="wellGrid"></tbody>
        </table>
      </div>

      <!-- ===== SIDE CONTROL PANEL ===== -->
      <div class="side-panel">

        <!-- selected well -->
        <div class="title-bar" id="selectedWell">A1</div>

        <div class="naming">

          <!-- sample name input -->
          <div class="field-block">
            <label for="sampleName" class="field-label" data-i18n="LABEL_SAMPLE_NAME">
            </label>
            <input
              type="text"
              id="sampleName"
              data-i18n-placeholder="PLACEHOLDER_SAMPLE_NAME"
            >
          </div>

          <!-- set buttons -->
          <div class="btn-group-row">
            <button id="setBtn" class="small-btn" data-i18n="BUTTON_SET"></button>
            <button id="quickSetBtn" class="small-btn" data-i18n="BUTTON_QUICKSET"></button>
            <button id="clearBtn" class="small-btn danger" data-i18n="BUTTON_CLEARALL"></button>
          </div>

          <!-- create button -->
          <div class="save-btn-container">
            <button id="saveBtn" class="create-btn" data-i18n="BUTTON_CREATE"></button>
          </div>

        </div>
      </div>

      <!-- ===== SAMPLE FILE LIST PANEL ===== -->
      <div class="file-panel">

        <div class="panel-header">
          <h2 data-i18n="LABEL_AVAILABLE_SAMPLEFILE"></h2>
        </div>

        <div class="panel-body">
          <div id="result-grid" class="result-grid">
            <!-- items will be generated by javascript -->
          </div>
        </div>

        <div class="panel-footer">
          <!-- <button id="load-btn" class="load-btn">Load</button> -->
          <button id="delete-btn" class="delete-btn" data-i18n="BUTTON_DELETE"></button>
          <button id="deleteall-btn" class="deleteall-btn" data-i18n="BUTTON_DELETEALL"></button>
        </div>

      </div>

    </div>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer>
    <button id="btnBack" type="button" data-i18n="BUTTON_BACK"></button>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="../Navigation/nav.js"></script>
  <script src="sample_setting.js"></script>
  <script src="../lang/i18n.js"></script>

</body>
</html>
