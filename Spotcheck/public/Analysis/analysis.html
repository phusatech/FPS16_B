<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - Spotcheck 26001</title>

  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="analysis.css">
  <link rel="stylesheet" href="../general_style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-magnifying-glass-chart"></i> 
        <span data-i18n="HEADER_ANALYSIS"></span>
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="container">

      <!-- ===== LEFT PANEL: TAB SECTION ===== -->
      <div class="tab-panel">

        <!-- TAB BUTTONS -->
        <div class="tab-header">
          <button class="tab-btn" data-tab="tab1" data-i18n="BUTTON_RESULT"></button>
          <!-- <button class="tab-btn" data-tab="tab2" data-i18n="BUTTON_SUBRESULT"></button> -->
          <button class="tab-btn" data-tab="tab-image" data-i18n="BUTTON_IMAGE"></button>
        </div>

        <!-- TAB CONTENT AREA -->
        <div class="tab-content">
          <p class="tab-placeholder">Tab content...</p>
        </div>

      </div>

      <!-- ===== RIGHT PANEL: NOTES ===== -->
      <div class="note-panel">

        <!-- NOTE HEADER -->
        <div class="note-reference" data-i18n="LABEL_REFERENCE">
        </div>

        <div class="note-row note-header">
          <div class="note-cell" data-i18n="LABEL_VALUE"></div>
          <div class="note-cell">CT</div>
        </div>

        <!-- NOTE ROWS -->
        <div class="note-row">
          <div class="note-cell negative">0</div>
          <div class="note-cell negative">-</div>
        </div>

        <div class="note-row">
          <div class="note-cell doubt">1-100</div>
          <div class="note-cell doubt">&gt; 40</div>
        </div>

        <div class="note-row">
          <div class="note-cell lowcopy">1-100</div>
          <div class="note-cell lowcopy">35-40</div>
        </div>

        <div class="note-row">
          <div class="note-cell mediumcopy">101-1000</div>
          <div class="note-cell mediumcopy">30-34</div>
        </div>

        <div class="note-row">
          <div class="note-cell positive">1001-10000</div>
          <div class="note-cell positive">26-29</div>
        </div>

        <!-- <div class="note-row">
          <div class="note-cell positive">1001-10000</div>
          <div class="note-cell positive">27-29</div>
        </div> -->

        <div class="note-row">
          <div class="note-cell positive">&gt; 10000</div>
          <div class="note-cell positive">&lt; 26</div>
        </div>

      </div>

    </div>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer id="footerArea">
    <div id="footerLoading" class="footer-loading">
      <div class="footer-spinner-text">
        <div class="spinner"></div>
        <span class="processing-text" data-i18n="LABEL_PROCESSING"></span>
      </div>
    </div>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="../Navigation/nav.js"></script>
  <script src="analysis.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script> -->
  <script src="../assets/html2canvas-1.4.1/html2canvas.min.js"></script>
  <script src="../lang/i18n.js"></script>


</body>
</html>
