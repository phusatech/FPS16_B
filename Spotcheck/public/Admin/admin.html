<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - Admin</title>

  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="./admin.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-user-tie"></i> ADMIN
      </span>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <div class="main-container">

      <!-- GRID -->
      <div class="content-grid">

        <!-- LEFT -->
        <div class="column">

          <section class="panel">
            <h3>Device Info</h3>

            <div class="form-row">
              <label>Host name</label>
              <input type="text" id="host_name" class="small-input">
            </div>

            <div class="form-row">
              <label>Seri number</label>
              <input type="text" id="seri_number" class="small-input">
            </div>
          </section>

          <section class="panel">
            <h3>Coefficients</h3>
            <table id="coeffTable" class="table-grid"></table>
          </section>

          <section class="panel">
            <h3>Base Value</h3>
            <table id="baseTable" class="table-grid"></table>
          </section>

        </div>

        <!-- RIGHT -->
        <div class="column">

          <section class="panel">
            <h3>Threshold</h3>

            <div class="form-row">
              <label>a_value</label>
              <input type="number" id="a_value" class="small-input">
            </div>

            <div class="form-row">
              <label>b_value</label>
              <input type="number" id="b_value" class="small-input">
            </div>
          </section>

          <section class="panel">
            <h3>Coordinates</h3>

            <div class="coord-section">
              <span>Editable</span>

              <div class="coord-grid labeled">
                <div class="coord-item">
                  <label>x1</label>
                  <input type="number" step="any" id="x1">
                </div>

                <div class="coord-item">
                  <label>y1</label>
                  <input type="number" step="any" id="y1">
                </div>

                <div class="coord-item">
                  <label>x2</label>
                  <input type="number" step="any" id="x2">
                </div>

                <div class="coord-item">
                  <label>y2</label>
                  <input type="number" step="any" id="y2">
                </div>
              </div>
            </div>

            <div class="coord-section">
              <span>Suggested</span>

              <div class="coord-grid labeled">
                <div class="coord-item">
                  <label>x1</label>
                  <input type="number" id="x1_0" disabled>
                </div>

                <div class="coord-item">
                  <label>y1</label>
                  <input type="number" id="y1_0" disabled>
                </div>

                <div class="coord-item">
                  <label>x2</label>
                  <input type="number" id="x2_0" disabled>
                </div>

                <div class="coord-item">
                  <label>y2</label>
                  <input type="number" id="y2_0" disabled>
                </div>
              </div>
            </div>
          </section>

          <section class="panel">
            <h3>FAM</h3>

            <div class="form-row">
              <label>threshold_1</label>
              <input type="number" id="threshold_1">
            </div>

            <div class="form-row">
              <label>threshold_2</label>
              <input type="number" id="threshold_2">
            </div>

            <div class="form-row">
              <label>threshold_3</label>
              <input type="number" id="threshold_3">
            </div>

            <div class="form-row">
              <label>minus_value</label>
              <input type="number" id="minus_value">
            </div>
          </section>

          <!-- NEW SECTION: Analysis Thresholds -->
          <section class="panel">
            <h3>Analysis Thresholds</h3>

            <div class="form-row">
              <label>Doubt</label>
              <input type="number" step="0.01" id="doubt">
            </div>

            <div class="form-row">
              <label>Low copy</label>
              <input type="number" step="0.01" id="low_copy">
            </div>

            <div class="form-row">
              <label>Medium copy</label>
              <input type="number" step="0.01" id="medium_copy">
            </div>

            <div class="form-row">
              <label>High copy 1</label>
              <input type="number" step="0.01" id="high_copy_1">
            </div>

            <div class="form-row">
              <label>High copy 2</label>
              <input type="number" step="0.01" id="high_copy_2">
            </div>
          </section>

        </div>

      </div> <!-- END GRID -->

    </div> <!-- END CONTAINER -->

    <!-- APPLY -->
    <div class="apply-area">
      <button id="btnApply">Apply</button>
    </div>

    <!-- UPDATE -->
    <div class="update-area">
      <section class="panel">
        <h3>UPDATE</h3>

        <div class="update-row">
          <label>Current Version</label>
          <input id="currentVersion" disabled>
        </div>

        <div class="update-actions">
          <button id="btnCheckUpdate">Check Update</button>
        </div>

      </section>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <button id="backBtn">Back</button>
  </footer>

  <!-- POPUP UPDATE -->
  <div id="updateModal" class="modal hidden">
      <div class="modal-content">
          <div class="modal-header">
              <h3>System Update</h3>
              <div style="height: 1px; background: #3e4451; margin: 10px 0;"></div>
          </div>

          <div class="modal-body">
              <p id="updateStatus">Sẵn sàng kiểm tra phiên bản mới...</p>
              
              <div class="progress-container">
                  <div id="progressFill"></div>
              </div>
          </div>

          <div class="modal-footer">
              <button id="btnStartUpdate" class="btn-primary" hidden>
                  Update Now
              </button>
              
              <button id="btnCloseModal" class="btn-secondary">
                  Close
              </button>
          </div>
      </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="admin.js"></script>
  <script src="../Navigation/nav.js"></script>

</body>
</html>
