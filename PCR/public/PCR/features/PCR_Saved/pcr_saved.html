<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="google" content="notranslate">
  <title>PCR Protocols</title>
  <link rel="stylesheet" href="../PCR_Elements/style.css">
  <link rel="stylesheet" href="./pcr_saved.css">
</head>
<body>

  <div id="page-loading" class="page-loading"><div class="page-spinner"></div></div>
  <main class="mobile-container" id="pcr-main" style="visibility:hidden">

    <div class="saved-toolbar">
      <button id="back-btn" class="saved-back-btn">Back</button>
    </div>

    <div class="search-wrapper">
        <div class="search-field">
            <i class="fa-solid fa-magnifying-glass field-icon"></i>
            <input type="text" id="protocol-filter" placeholder="Search Protocol name...">
        </div>
        
        <select id="date-filter-select">
            <option value="all">-- Filter by Date --</option>
        </select>
    </div>

    <section id="protocol-registry-stack" class="registry-stack">
      <div class="ux-loading">
        <div class="spinner"></div>
        <p>Loading database storage...</p>
      </div>
    </section>

  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="../../components/header/header.js"></script> 
  <script src="../../components/program/program.js"></script> 

  <script src="../../shared/Data_config.js"></script>
  <script src="../../shared/Convert.js"></script>
  <script src="../../shared/Handle.js"></script>

  <script src="../../components/notification.js"></script>
  <script src="../../components/Render_Managers.js"></script>
  <script type="module" src="../../shared/PageRouter.js"></script>
  <script type="module" src="../PCR_Saved/pcr_saved.js"></script>
  
</body>
</html>
